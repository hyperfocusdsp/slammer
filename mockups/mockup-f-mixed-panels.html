<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SLAMMER - Mockup F: Mixed Panel Sections</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; }
  canvas { box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 1px rgba(255,255,255,0.05); }
  .label { color: #666; text-align: center; margin-top: 14px; font-size: 13px; }
</style>
</head>
<body>
<div>
<canvas id="c" width="680" height="400"></canvas>
<div class="label">Mockup F: Coloured Section Panels (like synth ref) / Red 7-Seg / Brushed Knobs</div>
</div>
<script>
const W = 680, H = 400;
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

const RED = '#ff2020';
const RED_DIM = '#2a0808';
const RED_GLOW = 'rgba(255,30,20,0.15)';
const WHITE = '#e8e8e8';
const WHITE_DIM = 'rgba(230,230,230,0.35)';

function rand(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; };
}

function drawPaintedPanel(x, y, w, h, baseH, baseS, baseL, seed) {
  const r = rand(seed);
  const c1 = `hsl(${baseH}, ${baseS}%, ${baseL}%)`;
  const c2 = `hsl(${baseH}, ${baseS}%, ${baseL - 3}%)`;
  const c3 = `hsl(${baseH}, ${baseS}%, ${baseL + 2}%)`;
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, c3);
  grad.addColorStop(0.1, c1);
  grad.addColorStop(0.5, c2);
  grad.addColorStop(0.9, c1);
  grad.addColorStop(1, c3);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 3);
  ctx.fill();

  // Texture
  for (let i = 0; i < w * h * 0.22; i++) {
    const px = x + r() * w;
    const py = y + r() * h;
    const v = r() * 0.04 - 0.02;
    ctx.fillStyle = v > 0 ? `rgba(255,255,255,${v})` : `rgba(0,0,0,${-v * 1.5})`;
    ctx.fillRect(px, py, 1, 1);
  }

  // Scratches
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 3);
  ctx.clip();
  for (let i = 0; i < 6; i++) {
    const sx = x + r() * w;
    const sy = y + r() * h;
    const angle = r() * Math.PI;
    const len = 8 + r() * 25;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(angle) * len, sy + Math.sin(angle) * len);
    ctx.strokeStyle = `rgba(180,180,180,${0.02 + r() * 0.03})`;
    ctx.lineWidth = 0.3;
    ctx.stroke();
  }
  // Paint wear
  for (let i = 0; i < 4; i++) {
    const wx = x + r() * w;
    const wy = y + r() * h;
    ctx.beginPath();
    ctx.arc(wx, wy, 2 + r() * 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(60,60,55,${0.05 + r() * 0.08})`;
    ctx.fill();
  }
  ctx.restore();

  // Subtle bevel
  ctx.beginPath();
  ctx.roundRect(x + 0.5, y + 0.5, w - 1, h - 1, 3);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

function drawScrew(cx, cy, size, type) {
  const grad = ctx.createRadialGradient(cx - 0.5, cy - 0.5, 0, cx, cy, size);
  grad.addColorStop(0, '#aaa');
  grad.addColorStop(0.3, '#888');
  grad.addColorStop(0.7, '#555');
  grad.addColorStop(1, '#333');
  ctx.beginPath();
  ctx.arc(cx, cy, size, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  if (type === 'hex') {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
      const hx = cx + Math.cos(a) * size * 0.38;
      const hy = cy + Math.sin(a) * size * 0.38;
      if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
  } else {
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - size*0.4, cy); ctx.lineTo(cx + size*0.4, cy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy - size*0.4); ctx.lineTo(cx, cy + size*0.4);
    ctx.stroke();
  }
}

function drawBrushedKnob(cx, cy, radius, value, label) {
  // Shadow
  ctx.beginPath();
  ctx.arc(cx + 1, cy + 3, radius + 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();

  // Mounting ring
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();

  // Knob body
  const kgrad = ctx.createRadialGradient(cx - radius * 0.2, cy - radius * 0.25, radius * 0.1, cx, cy, radius);
  kgrad.addColorStop(0, '#b5b5b5');
  kgrad.addColorStop(0.2, '#999');
  kgrad.addColorStop(0.5, '#777');
  kgrad.addColorStop(0.8, '#555');
  kgrad.addColorStop(1, '#3a3a3a');
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = kgrad;
  ctx.fill();

  // Concentric brushing
  for (let r2 = radius * 0.25; r2 < radius; r2 += 0.7) {
    ctx.beginPath();
    ctx.arc(cx, cy, r2, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${0.025 + Math.sin(r2 * 4) * 0.012})`;
    ctx.lineWidth = 0.3;
    ctx.stroke();
  }

  // Knurled edge
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 24) {
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (radius - 0.8), cy + Math.sin(a) * (radius - 0.8));
    ctx.lineTo(cx + Math.cos(a) * (radius + 0.3), cy + Math.sin(a) * (radius + 0.3));
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Red LED indicator
  const ang = Math.PI * 0.75 + Math.PI * 1.5 * value;
  const dotR = Math.max(1.8, radius * 0.1);
  const dotX = cx + Math.cos(ang) * radius * 0.7;
  const dotY = cy + Math.sin(ang) * radius * 0.7;
  ctx.beginPath();
  ctx.arc(dotX, dotY, dotR * 3, 0, Math.PI * 2);
  ctx.fillStyle = RED_GLOW;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
  ctx.fillStyle = RED;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(dotX - 0.3, dotY - 0.3, dotR * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();

  // Tick marks
  for (let i = 0; i <= 10; i++) {
    const a = Math.PI * 0.75 + Math.PI * 1.5 * (i / 10);
    const inner = radius + 4;
    const outer = radius + (i % 5 === 0 ? 9 : 7);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
    ctx.lineTo(cx + Math.cos(a) * outer, cy + Math.sin(a) * outer);
    ctx.strokeStyle = WHITE_DIM;
    ctx.lineWidth = i % 5 === 0 ? 1 : 0.5;
    ctx.stroke();
  }

  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = WHITE;
  ctx.fillText(label, cx, cy + radius + 22);
}

function draw7Seg(x, y, w, h, text) {
  ctx.fillStyle = '#080808';
  ctx.beginPath();
  ctx.roundRect(x - 3, y - 3, w + 6, h + 6, 3);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + w + 2, y - 2);
  ctx.lineTo(x - 2, y - 2);
  ctx.lineTo(x - 2, y + h + 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#0a0202';
  ctx.fillRect(x, y, w, h);
  const glow = ctx.createRadialGradient(x + w/2, y + h/2, 0, x + w/2, y + h/2, w * 0.5);
  glow.addColorStop(0, 'rgba(60,5,5,0.35)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(x, y, w, h);

  if (text) {
    ctx.fillStyle = RED;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(text, x + w / 2, y + h / 2 + 5);
    ctx.globalAlpha = 0.06;
    ctx.fillText('8'.repeat(Math.max(text.length, 1)), x + w / 2, y + h / 2 + 5);
    ctx.globalAlpha = 1;
  }
}

function drawLcdSelector(x, y, w, h, text) {
  draw7Seg(x, y, w, h, text);
  const btnH = h + 6, btnW = 16;
  for (const [bx, arrow] of [[x - btnW - 6, '\u25C0'], [x + w + 6, '\u25B6']]) {
    const grad = ctx.createLinearGradient(bx, y - 3, bx, y - 3 + btnH);
    grad.addColorStop(0, '#444');
    grad.addColorStop(1, '#222');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(bx, y - 3, btnW, btnH, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(bx + 2, y - 2.5);
    ctx.lineTo(bx + btnW - 2, y - 2.5);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.fillStyle = WHITE_DIM;
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(arrow, bx + btnW / 2, y - 3 + btnH / 2 + 3);
  }
}

function drawLed(cx, cy, on) {
  ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI * 2); ctx.fillStyle = '#080808'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI * 2); ctx.fillStyle = on ? RED : RED_DIM; ctx.fill();
  if (on) { ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI * 2); ctx.fillStyle = RED_GLOW; ctx.fill(); }
}

// ===== RENDER =====

// Base frame — dark steel
ctx.fillStyle = '#151515';
ctx.fillRect(0, 0, W, H);

// Rack ears
const earW = 16;
const r0 = rand(77);
for (const ex of [0, W - earW]) {
  ctx.fillStyle = '#131313';
  ctx.fillRect(ex, 0, earW, H);
  for (let i = 0; i < earW * H * 0.2; i++) {
    ctx.fillStyle = `rgba(255,255,255,${r0() * 0.02})`;
    ctx.fillRect(ex + r0() * earW, r0() * H, 1, 1);
  }
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = '#090909';
    ctx.beginPath();
    ctx.roundRect(ex + 4, 30 + i * 44, 8, 22, 2);
    ctx.fill();
  }
}

// Rack screws
drawScrew(8, 16, 5, 'hex');
drawScrew(8, H - 16, 5, 'hex');
drawScrew(W - 8, 16, 5, 'hex');
drawScrew(W - 8, H - 16, 5, 'hex');

const panelL = earW + 2;
const panelW = W - earW * 2 - 4;

// === Header strip: dark charcoal ===
drawPaintedPanel(panelL, 0, panelW, 42, 210, 5, 14, 11);
ctx.font = 'bold 18px monospace';
ctx.fillStyle = WHITE;
ctx.textAlign = 'left';
ctx.fillText('SLAMMER', panelL + 16, 28);
drawLed(panelL + 106, 22, true);
ctx.font = '8px monospace';
ctx.fillStyle = WHITE_DIM;
ctx.textAlign = 'right';
ctx.fillText('KICK SYNTHESIZER', panelL + panelW - 16, 18);
ctx.fillStyle = 'rgba(255,255,255,0.2)';
ctx.fillText('v0.1.0', panelL + panelW - 16, 30);
drawScrew(panelL + 6, 8, 3.5, 'phillips');
drawScrew(panelL + panelW - 6, 8, 3.5, 'phillips');
drawScrew(panelL + 6, 34, 3.5, 'phillips');
drawScrew(panelL + panelW - 6, 34, 3.5, 'phillips');

// === Master row: dark blue-grey ===
const mRow = 44;
drawPaintedPanel(panelL, mRow, panelW, 72, 210, 20, 18, 22);
draw7Seg(panelL + 14, mRow + 8, 374, 54, '');
// Waveform
ctx.save();
ctx.beginPath();
ctx.rect(panelL + 15, mRow + 9, 372, 52);
ctx.clip();
const rw = rand(55);
for (let i = 0; i < 372; i++) {
  const amp = Math.exp(-Math.abs(i - 60) / 28) * 22 + Math.exp(-Math.abs(i - 155) / 42) * 14;
  const noise = (rw() - 0.5) * amp * 0.7;
  const mid = mRow + 35;
  ctx.fillStyle = 'rgba(255,30,20,0.3)';
  ctx.fillRect(panelL + 15 + i, mid - Math.abs(noise), 1, Math.abs(noise) * 2);
}
ctx.restore();
ctx.font = '6px monospace';
ctx.fillStyle = 'rgba(255,30,20,0.25)';
ctx.textAlign = 'left';
ctx.fillText('OUTPUT', panelL + 18, mRow + 18);

drawBrushedKnob(panelL + panelW - 140, mRow + 36, 16, 0.35, 'DECAY');
drawBrushedKnob(panelL + panelW - 90, mRow + 36, 16, 0.8, 'VEL');
drawBrushedKnob(panelL + panelW - 40, mRow + 36, 16, 0.5, 'MASTER');

// === SUB + TOP row: muted teal ===
const sRow = mRow + 74;
const sH = 72;
drawPaintedPanel(panelL, sRow, panelW * 0.6, sH, 190, 25, 20, 33);
drawPaintedPanel(panelL + panelW * 0.6 + 2, sRow, panelW * 0.4 - 2, sH, 190, 25, 20, 44);

const kS = 42;
const k0 = panelL + 50;
ctx.font = 'bold 9px monospace';
ctx.fillStyle = WHITE;
ctx.textAlign = 'left';
ctx.fillText('SUB', panelL + 8, sRow + 14);
for (const [i, lbl, val] of [[0,'GAIN',0.85],[1,'START',0.4],[2,'END',0.25],[3,'SWEEP',0.3],[4,'CURVE',0.45],[5,'PHASE',0.25]])
  drawBrushedKnob(k0 + kS*i, sRow + 36, 14, val, lbl);

drawScrew(panelL + panelW * 0.6 - 6, sRow + 6, 3, 'phillips');
drawScrew(panelL + panelW * 0.6 - 6, sRow + sH - 6, 3, 'phillips');

const t0 = panelL + panelW * 0.6 + 40;
ctx.fillText('TOP', panelL + panelW * 0.6 + 10, sRow + 14);
for (const [i, lbl, val] of [[0,'GAIN',0.25],[1,'DECAY',0.15],[2,'FREQ',0.5],[3,'BW',0.5]])
  drawBrushedKnob(t0 + kS*i, sRow + 36, 14, val, lbl);

// === MID row: warm dark olive ===
const midy = sRow + sH + 2;
drawPaintedPanel(panelL, midy, panelW, 72, 50, 15, 18, 55);
ctx.font = 'bold 9px monospace';
ctx.fillStyle = WHITE;
ctx.textAlign = 'left';
ctx.fillText('MID', panelL + 8, midy + 14);
for (const [i, lbl, val] of [[0,'GAIN',0.5],[1,'START',0.5],[2,'END',0.3],[3,'SWEEP',0.2],[4,'CURVE',0.55],[5,'DECAY',0.3],[6,'TONE',0.7],[7,'NOISE',0.3],[8,'COLOR',0.4]])
  drawBrushedKnob(k0 + kS*i, midy + 36, 14, val, lbl);

drawScrew(panelL + 6, midy + 6, 3, 'phillips');
drawScrew(panelL + panelW - 6, midy + 6, 3, 'phillips');

// === SAT + EQ row: dark charcoal/rust tint ===
const eqy = midy + 74;
drawPaintedPanel(panelL, eqy, panelW * 0.42, 72, 15, 15, 16, 66);
drawPaintedPanel(panelL + panelW * 0.42 + 2, eqy, panelW * 0.58 - 2, 72, 210, 12, 15, 77);

ctx.font = 'bold 9px monospace';
ctx.fillStyle = WHITE;
ctx.textAlign = 'left';
ctx.fillText('SAT', panelL + 8, eqy + 14);
drawLcdSelector(panelL + 58, eqy + 8, 62, 20, 'SOFT');
drawBrushedKnob(panelL + 162, eqy + 36, 14, 0.35, 'DRIVE');
drawBrushedKnob(panelL + 204, eqy + 36, 14, 1.0, 'MIX');

drawScrew(panelL + panelW * 0.42 - 6, eqy + 6, 3, 'phillips');
drawScrew(panelL + panelW * 0.42 - 6, eqy + 66, 3, 'phillips');

const eq0 = panelL + panelW * 0.42 + 50;
ctx.fillText('EQ', panelL + panelW * 0.42 + 10, eqy + 14);
for (const [i, lbl, val] of [[0,'TILT',0.5],[1,'LOW',0.6],[2,'NOTCH',0.4],[3,'Q',0.1],[4,'DEPTH',0.6]])
  drawBrushedKnob(eq0 + kS*i, eqy + 36, 14, val, lbl);

// Brand bottom
ctx.font = '7px monospace';
ctx.fillStyle = 'rgba(255,255,255,0.05)';
ctx.textAlign = 'center';
ctx.fillText('REXIST INSTRUMENTS', W / 2, H - 6);
</script>
</body>
</html>
